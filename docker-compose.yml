services:
  app:
    build:
      context: .
    ports:
      - "3030:3030"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend_uploads:/app/uploads

volumes:
  backend_uploads:
